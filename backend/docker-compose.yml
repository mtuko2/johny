version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: quantum_db
    environment:
      POSTGRES_USER: quantum_user
      POSTGRES_PASSWORD: quantum_password
      POSTGRES_DB: quantum_db
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
